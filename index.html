<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חידת סדר כרונולוגי</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --gap: 14px;
      --radius: 14px;
      --good: #2e9d52;
      --bad: #d9534f;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f3f3f3;
      color: #222;
      user-select: none;
    }

    .game {
      max-width: 1120px;
      margin: auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 38px);
    }

    .instructions {
      margin: 0 0 14px;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 1.45;
    }

    .timeline-key {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 760px;
      margin: 0 auto 18px;
      font-weight: bold;
      font-size: 17px;
    }

    .timeline-line {
      flex: 1;
      height: 3px;
      background: #666;
      position: relative;
      min-width: 50px;
    }

    .timeline-line::after {
      content: "";
      position: absolute;
      left: -1px;
      top: 50%;
      transform: translateY(-50%);
      border-right: 10px solid #666;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
    }

    #container {
      display: grid;
      grid-template-columns: repeat(var(--columns, 5), minmax(125px, 1fr));
      gap: var(--gap);
      margin: 0 auto 24px;
      direction: rtl;
    }

    .slot {
      min-width: 0;
    }

    .position-number {
      width: 34px;
      height: 34px;
      margin: 0 auto 7px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: white;
      border: 2px solid #777;
      font-size: 17px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.12);
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      perspective: 1000px;
      cursor: grab;
      touch-action: pan-y;
      transition: transform .18s ease, opacity .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card:active { cursor: grabbing; }

    .card-inner {
      position: absolute;
      inset: 0;
      transition: transform 0.7s cubic-bezier(.2,.8,.2,1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      border: 2px solid #aaa;
      border-radius: var(--radius);
      overflow: hidden;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
      backface-visibility: hidden;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .card-front {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .card-back {
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotateY(180deg);
      font-size: clamp(42px, 8vw, 84px);
      font-weight: bold;
    }

    .card.dragging {
      opacity: 0.35;
      transform: scale(0.96);
    }

    .card.hold-ready {
      transform: scale(1.04);
    }

    .card.drop-target .card-front,
    .card.drop-target .card-back {
      outline: 4px solid #555;
      outline-offset: 2px;
    }

    .card.correct .card-front,
    .card.correct .card-back {
      border-color: var(--good);
      box-shadow: 0 0 0 4px rgba(46,157,82,.2), 0 4px 12px rgba(0,0,0,.18);
    }

    .card.wrong .card-front,
    .card.wrong .card-back {
      border-color: var(--bad);
      box-shadow: 0 0 0 4px rgba(217,83,79,.18), 0 4px 12px rgba(0,0,0,.18);
    }

    .shake {
      animation: shake .38s ease;
    }

    .success-pop {
      animation: successPop .45s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      50% { transform: translateX(7px); }
      75% { transform: translateX(-4px); }
    }

    @keyframes successPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      box-shadow: 0 2px 7px rgba(0,0,0,0.2);
      transition: transform .15s ease;
    }

    button:hover { transform: translateY(-1px); }

    #message {
      min-height: 30px;
      margin-top: 18px;
      font-size: 20px;
      font-weight: bold;
    }

    .success-panel {
      display: none;
      margin: 24px auto 0;
      max-width: 620px;
      padding: 18px 22px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      animation: panelIn .55s ease;
    }

    .success-panel.show { display: block; }

    .success-panel h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
    }

    .success-panel p {
      margin: 0;
      font-size: clamp(19px, 3vw, 26px);
      line-height: 1.4;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 900px) {
      #container {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .timeline-key {
        max-width: 560px;
      }
    }

    @media (max-width: 430px) {
      body { padding: 14px; }

      #container { gap: 11px; }

      .position-number {
        width: 30px;
        height: 30px;
        font-size: 15px;
      }

      button { flex: 1 1 100%; }
    }


    @media (orientation: landscape) and (max-height: 520px) {
      body {
        padding: 8px 12px 14px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 3px;
      }

      .instructions {
        font-size: 14px;
        line-height: 1.25;
        margin-bottom: 6px;
      }

      .timeline-key {
        margin-bottom: 8px;
        font-size: 13px;
      }

      #container {
        grid-template-columns: repeat(5, minmax(95px, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }

      .position-number {
        width: 25px;
        height: 25px;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .card {
        max-height: 125px;
      }

      .buttons {
        gap: 7px;
      }

      button {
        padding: 8px 13px;
        font-size: 14px;
      }

      #message {
        margin-top: 8px;
        font-size: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <main class="game">
    <h1>סדרו את התמונות לפי הסדר הכרונולוגי</h1>

    <p class="instructions">
      מקום 1 הוא המוקדם ביותר. המקום האחרון הוא המאוחר ביותר.<br>
      במחשב גררו תמונה על תמונה אחרת. בטלפון לחצו לחיצה ממושכת ואז גררו.
    </p>

    <div class="timeline-key" aria-hidden="true">
      <span>המוקדם ביותר</span>
      <div class="timeline-line"></div>
      <span>המאוחר ביותר</span>
    </div>

    <div id="container"></div>

    <div class="buttons">
      <button id="checkButton">בדיקה</button>
      <button id="shuffleButton">ערבוב מחדש</button>
      <button id="soundButton" aria-pressed="true">🔊 צלילים פעילים</button>
    </div>

    <div id="message"></div>

    <section id="successPanel" class="success-panel" aria-live="polite">
      <h2>כל הכבוד!</h2>
      <p>מצאתם את התחנה הבאה שלכם.</p>
    </section>
  </main>

  <script>
    /*
      כדי לשנות את כמות התמונות:
      מוסיפים או מוחקים שורות ברשימה הזאת.

      image = שם קובץ התמונה
      letter = האות שתופיע מאחור
    */
    const answerOnCards = "לוחהכדורסל";

    const images = [
      "1.jpg",
      "2.jpg",
      "3.jpg",
      "4.jpg",
      "5.jpg",
      "6.jpg",
      "7.jpg",
      "8.jpg",
      "9.jpg",
      "10.jpg"
    ];

    const items = images.map((image, index) => ({
      image,
      letter: answerOnCards[index] || ""
    }));

    const container = document.getElementById("container");
    const message = document.getElementById("message");
    const checkButton = document.getElementById("checkButton");
    const shuffleButton = document.getElementById("shuffleButton");
    const soundButton = document.getElementById("soundButton");
    const successPanel = document.getElementById("successPanel");

    let draggedCard = null;
    let pointerCard = null;
    let pointerClone = null;
    let holdTimer = null;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchPointerId = null;
    let touchDragActive = false;
    const HOLD_DELAY = 350;
    const MOVE_TOLERANCE = 12;
    let soundOn = true;
    let audioContext = null;

    function desktopColumns(count) {
      if (count <= 4) return count;
      if (count <= 8) return 4;
      if (count <= 10) return 5;
      if (count <= 12) return 6;
      return 5;
    }

    container.style.setProperty("--columns", desktopColumns(items.length));

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    function tone(frequency, duration, type = "sine", volume = 0.05, delay = 0) {
      if (!soundOn) return;

      const ctx = getAudioContext();
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      const start = ctx.currentTime + delay;

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(volume, start);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.start(start);
      oscillator.stop(start + duration);
    }

    function playSwap() {
      tone(330, .08, "triangle", .035);
      tone(440, .09, "triangle", .03, .05);
    }

    function playWrong() {
      tone(180, .14, "sawtooth", .035);
      tone(140, .18, "sawtooth", .03, .10);
    }

    function playSuccess() {
      tone(523.25, .18, "sine", .045);
      tone(659.25, .18, "sine", .045, .13);
      tone(783.99, .28, "sine", .05, .26);
    }

    function playFlip(index) {
      tone(280 + index * 22, .08, "triangle", .025);
    }

    function shuffle(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      const alreadyCorrect = copy.every(
        (item, index) => item.image === items[index].image
      );

      return alreadyCorrect && copy.length > 1 ? shuffle(array) : copy;
    }

    function createCard(item) {
      const card = document.createElement("div");
      card.className = "card";
      card.draggable = true;
      card.dataset.image = item.image;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            <img src="${item.image}" alt="">
          </div>
          <div class="card-back">${item.letter}</div>
        </div>
      `;

      return card;
    }

    function render(list) {
      container.innerHTML = "";
      successPanel.classList.remove("show");

      list.forEach((item, index) => {
        const slot = document.createElement("div");
        slot.className = "slot";

        const number = document.createElement("div");
        number.className = "position-number";
        number.textContent = index + 1;

        slot.appendChild(number);
        slot.appendChild(createCard(item));
        container.appendChild(slot);
      });

      addDragListeners();
    }

    function cards() {
      return [...container.querySelectorAll(".card")];
    }

    function clearFeedback() {
      cards().forEach(card => {
        card.classList.remove("correct", "wrong", "shake", "success-pop");
      });
    }

    function addDragListeners() {
      cards().forEach(card => {
        card.addEventListener("dragstart", () => {
          if (card.classList.contains("flipped")) return;
          draggedCard = card;
          clearFeedback();
          card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          cards().forEach(c => c.classList.remove("drop-target"));
          draggedCard = null;
        });

        card.addEventListener("dragover", event => {
          event.preventDefault();

          if (draggedCard && draggedCard !== card) {
            card.classList.add("drop-target");
          }
        });

        card.addEventListener("dragleave", () => {
          card.classList.remove("drop-target");
        });

        card.addEventListener("drop", event => {
          event.preventDefault();
          card.classList.remove("drop-target");

          if (!draggedCard || draggedCard === card) return;
          swapCards(draggedCard, card);
        });

        card.addEventListener("pointerdown", pointerDown);
      });
    }

    function swapCards(first, second) {
      const firstSlot = first.closest(".slot");
      const secondSlot = second.closest(".slot");

      firstSlot.appendChild(second);
      secondSlot.appendChild(first);

      message.textContent = "";
      clearFeedback();
      playSwap();
    }

    function pointerDown(event) {
      if (event.pointerType === "mouse") return;
      if (event.currentTarget.classList.contains("flipped")) return;

      cancelTouchDrag();

      pointerCard = event.currentTarget;
      touchPointerId = event.pointerId;
      touchStartX = event.clientX;
      touchStartY = event.clientY;
      touchDragActive = false;

      holdTimer = setTimeout(() => {
        if (!pointerCard) return;

        touchDragActive = true;
        clearFeedback();
        successPanel.classList.remove("show");

        pointerCard.classList.add("dragging", "hold-ready");

        try {
          pointerCard.setPointerCapture(touchPointerId);
        } catch (error) {
          // Some mobile browsers do not allow capture in every situation.
        }

        pointerClone = pointerCard.cloneNode(true);
        pointerClone.classList.remove("dragging", "hold-ready");
        pointerClone.style.position = "fixed";
        pointerClone.style.width = pointerCard.offsetWidth + "px";
        pointerClone.style.height = pointerCard.offsetHeight + "px";
        pointerClone.style.zIndex = "9999";
        pointerClone.style.pointerEvents = "none";
        pointerClone.style.opacity = "0.88";
        pointerClone.style.transform = "scale(1.03)";
        document.body.appendChild(pointerClone);

        moveClone(event);
        tone(520, .07, "triangle", .025);
      }, HOLD_DELAY);

      pointerCard.addEventListener("pointermove", pointerMove);
      pointerCard.addEventListener("pointerup", pointerUp, { once: true });
      pointerCard.addEventListener("pointercancel", pointerCancel, { once: true });
      pointerCard.addEventListener("lostpointercapture", pointerCancel, { once: true });
    }

    function pointerMove(event) {
      if (!pointerCard || event.pointerId !== touchPointerId) return;

      const movedX = Math.abs(event.clientX - touchStartX);
      const movedY = Math.abs(event.clientY - touchStartY);

      // Before the long press activates, any normal scrolling movement
      // cancels the drag and leaves the page free to scroll.
      if (!touchDragActive) {
        if (movedX > MOVE_TOLERANCE || movedY > MOVE_TOLERANCE) {
          clearTimeout(holdTimer);
          holdTimer = null;
        }
        return;
      }

      event.preventDefault();
      moveClone(event);

      cards().forEach(c => c.classList.remove("drop-target"));

      const element = document.elementFromPoint(event.clientX, event.clientY);
      const target = element ? element.closest(".card") : null;

      if (target && target !== pointerCard) {
        target.classList.add("drop-target");
      }
    }

    function moveClone(event) {
      if (!pointerClone) return;

      pointerClone.style.left =
        (event.clientX - pointerClone.offsetWidth / 2) + "px";

      pointerClone.style.top =
        (event.clientY - pointerClone.offsetHeight / 2) + "px";
    }

    function pointerUp(event) {
      clearTimeout(holdTimer);
      holdTimer = null;

      if (touchDragActive) {
        const element = document.elementFromPoint(event.clientX, event.clientY);
        const target = element ? element.closest(".card") : null;

        if (target && pointerCard && target !== pointerCard) {
          swapCards(pointerCard, target);
        }
      }

      cancelTouchDrag();
    }

    function pointerCancel() {
      cancelTouchDrag();
    }

    function cancelTouchDrag() {
      clearTimeout(holdTimer);
      holdTimer = null;

      if (pointerCard) {
        pointerCard.classList.remove("dragging", "hold-ready");
        pointerCard.removeEventListener("pointermove", pointerMove);
      }

      cards().forEach(c => c.classList.remove("drop-target"));

      if (pointerClone) {
        pointerClone.remove();
      }

      pointerCard = null;
      pointerClone = null;
      touchPointerId = null;
      touchDragActive = false;
    }

    window.addEventListener("blur", cancelTouchDrag);
    window.addEventListener("orientationchange", cancelTouchDrag);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) cancelTouchDrag();
    });

    checkButton.addEventListener("click", () => {
      clearFeedback();

      const currentCards = cards();
      const correctOrder = items.map(item => item.image);

      const results = currentCards.map(
        (card, index) => card.dataset.image === correctOrder[index]
      );

      const isCorrect = results.every(Boolean);

      if (isCorrect) {
        message.textContent = "";
        playSuccess();

        currentCards.forEach((card, index) => {
          card.classList.add("correct");

          setTimeout(() => {
            card.classList.add("success-pop", "flipped");
            playFlip(index);
          }, index * 140);
        });

        setTimeout(() => {
          successPanel.classList.add("show");
          successPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, currentCards.length * 140 + 250);
      } else {
        successPanel.classList.remove("show");
        const correctCount = results.filter(Boolean).length;
        message.textContent =
          correctCount === 0
            ? "עדיין לא. נסו שוב."
            : `${correctCount} תמונות נמצאות במקום הנכון. נסו שוב.`;

        playWrong();

        currentCards.forEach((card, index) => {
          if (results[index]) {
            card.classList.add("correct");
          } else {
            card.classList.add("wrong", "shake");
          }
        });
      }
    });

    shuffleButton.addEventListener("click", () => {
      message.textContent = "";
      successPanel.classList.remove("show");
      render(shuffle(items));
      playSwap();
    });

    soundButton.addEventListener("click", () => {
      soundOn = !soundOn;
      soundButton.setAttribute("aria-pressed", String(soundOn));
      soundButton.textContent = soundOn
        ? "🔊 צלילים פעילים"
        : "🔇 צלילים כבויים";

      if (soundOn) playSwap();
    });

    render(shuffle(items));
  </script>
</body>
</html>
