<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#4f8b3b">
  <title>תפזורת | בשביל החוויה</title>

  <!-- העיצוב המשותף נמצא בתיקיית assets הראשית -->
  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell word-search-shell">
    <header class="brand-header">
      <img
        class="brand-logo"
        src="../assets/logo.png"
        alt="בשביל החוויה – אירועים בדרך אחרת">
    </header>

    <section class="hero word-search-hero" aria-labelledby="gameTitle">
      <h1 id="gameTitle" class="game-title"></h1>
      <p id="gameSubtitle" class="game-subtitle"></p>
      <p id="gameInstructions" class="instructions"></p>
    </section>

    <section class="game-card word-search-card" aria-label="משחק תפזורת">
      <div class="game-toolbar">
        <p id="progressText" class="progress-text" aria-live="polite"></p>

        <button
          id="resetButton"
          class="btn btn-secondary reset-button"
          type="button">
          התחלה מחדש
        </button>
      </div>

      <div class="grid-stage">
        <div
          id="letterGrid"
          class="letter-grid"
          role="grid"
          aria-label="רשת אותיות. גררו בקו ישר כדי לסמן מילה">
        </div>
      </div>

      <p
        id="statusText"
        class="status-text"
        aria-live="polite"
        aria-atomic="true">
      </p>

      <section
        id="successPanel"
        class="success-panel word-search-success hidden"
        aria-live="polite">
        <h2 id="successTitle"></h2>
        <p id="successMessage"></p>
      </section>

      <section id="dataError" class="data-error hidden" role="alert">
        <h2>לא ניתן לפתוח את התפזורת</h2>
        <p id="dataErrorText"></p>
      </section>
    </section>

    <footer class="site-footer">
      © 2026 בשביל החוויה – אירועים בדרך אחרת. כל הזכויות שמורות.
    </footer>
  </main>

  <script src="puzzle-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
