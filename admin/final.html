<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>סיום המשחק | 50 לרונית</title>
  <link rel="stylesheet" href="../assets/shared.css">
  <style>
    :root {
      --purple: #7047a3;
      --purple-dark: #53327c;
      --purple-soft: #f1eafb;
      --text: #2c2533;
      --border: #ded7e5;
      --bg: #f7f5f9;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at top right, rgba(112, 71, 163, 0.12), transparent 35%),
        radial-gradient(circle at bottom left, rgba(91, 159, 124, 0.10), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
    }

    .card {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 54px);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(65, 45, 78, 0.13);
      text-align: center;
    }

    .logo {
      width: 110px;
      max-width: 30vw;
      height: auto;
      margin-bottom: 18px;
    }

    .brand {
      margin: 0 0 10px;
      color: var(--purple-dark);
      font-size: 1rem;
      font-weight: 800;
    }

    h1 {
      margin: 0 0 22px;
      color: var(--purple-dark);
      font-size: clamp(2.1rem, 7vw, 4rem);
      line-height: 1.1;
    }

    .message {
      margin: 0;
      font-size: clamp(1.35rem, 4.6vw, 2rem);
      line-height: 1.55;
      font-weight: 700;
    }

    .prize {
      display: inline-block;
      margin-top: 26px;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--purple-soft);
      color: var(--purple-dark);
      font-size: clamp(1.15rem, 4vw, 1.55rem);
      font-weight: 800;
    }

    .heart {
      display: inline-block;
      margin-right: 6px;
      font-size: 1.2em;
      vertical-align: -0.06em;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="../assets/logo.png" alt="בשביל החוויה" class="logo">
    <p class="brand">50 לרונית</p>

    <h1>כל הכבוד!</h1>

    <p class="message">
      פיצחתם את חידון היובל לרונית!!!
    </p>

    <div class="prize">
      גשו אליה לקבל את חיבוק הפרס
      <span class="heart" aria-hidden="true">😍</span>
    </div>
  </main>
</body>
</html>
