<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>סיום המשחק</title>
  <link rel="stylesheet" href="../assets/shared.css">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f5f9;font-family:Arial,"Noto Sans Hebrew",sans-serif;color:#2c2533}
    .card{width:min(680px,calc(100% - 28px));padding:32px;background:#fff;border:1px solid #ded7e5;border-radius:20px;box-shadow:0 10px 30px rgba(65,45,78,.09);text-align:center}
    img{width:100px;height:auto}
    h1{margin:18px 0 12px;font-size:clamp(2rem,7vw,3.2rem)}
    p{font-size:1.15rem;line-height:1.6}
  </style>
</head>
<body>
  <main class="card">
    <img src="../assets/logo.png" alt="בשביל החוויה">
    <h1>כל הכבוד!</h1>
    <p>סיימתם את המשחק.</p>
  </main>
</body>
</html>
