<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>חידת מנגינה</title>
<style>
:root {
  --purple:#6f3aa5; --ink:#18345d; --paper:#fffaf1;
  --do:#2563d4; --re:#4caf36; --mi:#f3bf19; --fa:#f26a22;
  --sol:#8a4fb8; --la:#e8539a; --si:#28acd0;
}
* { box-sizing:border-box; }
body {
  margin:0; min-height:100vh; padding:18px;
  font-family:Arial,"Noto Sans Hebrew",sans-serif;
  color:var(--ink);
  background:radial-gradient(circle at 20% 5%,#fff,#fff9ef 58%,#f5ebdf);
}
.app { max-width:1180px; margin:auto; }
header { text-align:center; margin-bottom:14px; }
h1 { margin:0 0 8px; color:var(--purple); font-size:clamp(32px,5vw,58px); }
.instruction { margin:0; font-size:clamp(19px,2.5vw,28px); font-weight:700; line-height:1.4; }
.panel {
  margin-top:16px; padding:14px; border-radius:24px;
  border:1px solid #ead9c7; background:rgba(255,255,255,.82);
  box-shadow:0 10px 28px rgba(60,40,20,.12);
}
.staff-scroll, .keyboard-scroll {
  overflow-x:auto; -webkit-overflow-scrolling:touch; direction:ltr;
}
.staff-svg { display:block; min-width:920px; width:100%; height:auto; }
.staff-line { stroke:#666; stroke-width:1.7; }
.clef { font:120px serif; fill:#111; }
.time { font:700 34px Arial; fill:#111; }
.note-head { fill:#111; }
.stem,.ledger { stroke:#111; stroke-width:3; }
.flag { fill:none; stroke:#111; stroke-width:3; }
.color-dot { stroke:#fff; stroke-width:2; }

.piano {
  direction:ltr; position:relative; display:flex;
  min-width:800px; height:280px; overflow:hidden;
  border:10px solid var(--purple); border-radius:22px;
  background:#171717; box-shadow:0 10px 28px rgba(60,40,20,.18);
  user-select:none; touch-action:manipulation;
}
.piano-key {
  appearance:none; -webkit-appearance:none;
  border-radius:0; box-shadow:none; margin:0; padding:0;
  font-family:inherit;
}
.white-key {
  position:relative; flex:1 0 100px; height:100%;
  border:0; border-left:1px solid #aaa; border-right:1px solid #aaa;
  border-bottom:8px solid #d7cec1;
  background:linear-gradient(#fff,#f6f0e7);
  color:#111; cursor:pointer; z-index:1;
}
.white-key.active {
  background:linear-gradient(#eadcff,#f3eaff);
  transform:translateY(4px); border-bottom-width:4px;
}
.key-label {
  position:absolute; bottom:15px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:7px;
  font-size:18px; font-weight:800; pointer-events:none;
}
.key-dot { width:28px; height:28px; border-radius:50%; }
.black-key {
  position:absolute; top:0; width:60px; height:58%; z-index:4;
  border-radius:0 0 8px 8px;
  background:linear-gradient(90deg,#090909,#363636,#090909);
  border:2px solid #050505; box-shadow:0 5px 6px rgba(0,0,0,.45);
  pointer-events:none;
}
.b1{left:70px} .b2{left:170px} .b3{left:370px} .b4{left:470px} .b5{left:570px}

.controls { display:flex; justify-content:center; margin-top:14px; }
.control-button {
  border:1px solid #decceb; border-radius:999px;
  padding:11px 22px; background:#fff; color:var(--purple);
  font-size:18px; font-weight:800; cursor:pointer;
  box-shadow:0 5px 15px rgba(70,40,90,.14);
}
.control-button:active { transform:translateY(2px); }
.status { min-height:24px; text-align:center; margin-top:8px; font-weight:700; color:#66428d; }

@media(max-width:700px) {
  body{padding:10px}
  .panel{padding:8px;border-radius:18px}
  .piano{height:220px}
  .white-key{flex-basis:82px}
  .black-key{width:50px}
  .b1{left:57px} .b2{left:139px} .b3{left:303px} .b4{left:385px} .b5{left:467px}
}
@media(orientation:landscape) and (max-height:520px) {
  body{padding:6px}
  h1{font-size:28px;margin-bottom:2px}
  .instruction{font-size:15px}
  .panel{margin-top:7px;padding:6px}
  .staff-svg{min-width:760px}
  .piano{height:160px;min-width:700px;border-width:7px}
  .white-key{flex-basis:88px}
  .key-label{bottom:7px;font-size:15px;gap:4px}
  .key-dot{width:21px;height:21px}
  .black-key{width:52px}
  .b1{left:62px} .b2{left:150px} .b3{left:326px} .b4{left:414px} .b5{left:502px}
}
</style>
</head>

<section class="panel">
  <div class="keyboard-scroll">
    <div class="piano" id="piano">
      <button type="button" class="piano-key white-key" data-note="C4"><span class="key-label"><span class="key-dot" style="background:var(--do)"></span>דו</span></button>
      <button type="button" class="piano-key white-key" data-note="D4"><span class="key-label"><span class="key-dot" style="background:var(--re)"></span>רה</span></button>
      <button type="button" class="piano-key white-key" data-note="E4"><span class="key-label"><span class="key-dot" style="background:var(--mi)"></span>מי</span></button>
      <button type="button" class="piano-key white-key" data-note="F4"><span class="key-label"><span class="key-dot" style="background:var(--fa)"></span>פה</span></button>
      <button type="button" class="piano-key white-key" data-note="G4"><span class="key-label"><span class="key-dot" style="background:var(--sol)"></span>סול</span></button>
      <button type="button" class="piano-key white-key" data-note="A4"><span class="key-label"><span class="key-dot" style="background:var(--la)"></span>לה</span></button>
      <button type="button" class="piano-key white-key" data-note="B4"><span class="key-label"><span class="key-dot" style="background:var(--si)"></span>סי</span></button>
      <button type="button" class="piano-key white-key" data-note="C5"><span class="key-label"><span class="key-dot" style="background:var(--do)"></span>דו</span></button>
      <span class="black-key b1"></span><span class="black-key b2"></span>
      <span class="black-key b3"></span><span class="black-key b4"></span><span class="black-key b5"></span>
    </div>
  </div>
  <div class="controls"><button type="button" class="control-button" id="reset">↻ נגנו שוב</button></div>
  <div class="status" id="status">לחצו על קליד כדי להתחיל.</div>
</section>
</main>

<script>
const frequencies={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,C5:523.25};
let ctx=null;

function playPiano(note){
  ctx ||= new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
  const now=ctx.currentTime;
  const master=ctx.createGain();
  master.gain.setValueAtTime(0.0001,now);
  master.gain.exponentialRampToValueAtTime(0.55,now+0.01);
  master.gain.exponentialRampToValueAtTime(0.16,now+0.22);
  master.gain.exponentialRampToValueAtTime(0.0001,now+1.7);
  master.connect(ctx.destination);

  const harmonics=[
    [1,'triangle',0.72],[2,'sine',0.20],[3,'sine',0.08],[4,'sine',0.035]
  ];
  harmonics.forEach(([multiple,type,level])=>{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type=type;
    osc.frequency.setValueAtTime(frequencies[note]*multiple,now);
    gain.gain.value=level;
    osc.connect(gain).connect(master);
    osc.start(now);
    osc.stop(now+1.75);
  });
}

document.querySelectorAll('.white-key').forEach(key=>{
  key.addEventListener('pointerdown',e=>{
    e.preventDefault();
    playPiano(key.dataset.note);
    key.classList.add('active');
    document.getElementById('status').textContent='';
    setTimeout(()=>key.classList.remove('active'),180);
  });
});

document.getElementById('reset').addEventListener('click',()=>{
  document.querySelectorAll('.white-key').forEach(k=>k.classList.remove('active'));
  document.getElementById('status').textContent='אפשר להתחיל שוב מהתו הראשון.';
});
</script>
