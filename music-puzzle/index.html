<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>חידת מנגינה</title>
  <style>
    :root{
      --purple:#6f3aa5;
      --ink:#18345d;
      --paper:#fffaf1;
      --line:#d8c9b6;
      --shadow:0 10px 28px rgba(60,40,20,.12);
      --do:#2563d4;
      --re:#4caf36;
      --mi:#f3bf19;
      --fa:#f26a22;
      --sol:#8a4fb8;
      --la:#e8539a;
      --si:#28acd0;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,"Noto Sans Hebrew",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 20% 10%,rgba(255,255,255,.95),rgba(255,250,241,.96) 45%,#f8f0e5 100%);
      padding:18px;
      overscroll-behavior-y:none;
    }
    .app{max-width:1180px;margin:auto}
    header{text-align:center;margin-bottom:14px}
    h1{
      margin:0 0 8px;
      color:var(--purple);
      font-size:clamp(30px,5vw,58px);
      line-height:1.05;
    }
    .instruction{
      margin:0 auto;
      font-size:clamp(18px,2.4vw,28px);
      font-weight:700;
      line-height:1.4;
    }
    .panel{
      background:rgba(255,255,255,.78);
      border:1px solid #e6d6c4;
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:14px;
      margin-top:16px;
    }
    .staff-wrap{
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      direction:ltr;
    }
    #staff{
      display:block;
      min-width:920px;
      width:100%;
      height:auto;
    }
    .legend{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px 18px;
      margin:8px 0 0;
      font-weight:700;
    }
    .legend-item{display:flex;align-items:center;gap:6px}
    .dot{width:18px;height:18px;border-radius:50%;display:inline-block}
    .keyboard-shell{
      position:relative;
      direction:ltr;
      display:grid;
      grid-template-columns:repeat(8,1fr);
      min-width:760px;
      height:270px;
      border:10px solid var(--purple);
      border-radius:22px;
      overflow:hidden;
      background:#222;
      box-shadow:var(--shadow);
      touch-action:manipulation;
      user-select:none;
    }
    .keyboard-scroll{
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:3px;
    }
    .white-key{
      position:relative;
      background:linear-gradient(#fff,#f8f3e8);
      border-left:1px solid #b9afa4;
      border-right:1px solid #b9afa4;
      border-bottom:8px solid #ddd3c6;
      cursor:pointer;
      min-width:92px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding-bottom:15px;
      color:#111;
      font-size:18px;
      font-weight:800;
      transition:transform .06s,background .06s;
    }
    .white-key.active{
      background:#efe4ff;
      transform:translateY(4px);
      border-bottom-width:4px;
    }
    .key-label{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:7px;
      pointer-events:none;
    }
    .key-dot{width:28px;height:28px;border-radius:50%}
    .black-key{
      position:absolute;
      top:0;
      width:7.4%;
      height:58%;
      z-index:3;
      border-radius:0 0 8px 8px;
      background:linear-gradient(90deg,#111,#353535,#0b0b0b);
      border:2px solid #080808;
      box-shadow:0 5px 5px rgba(0,0,0,.38);
      pointer-events:none;
    }
    .b1{left:8.7%}.b2{left:21.2%}.b3{left:46.2%}.b4{left:58.7%}.b5{left:71.2%}
    .controls{
      display:flex;
      justify-content:center;
      gap:12px;
      margin:16px 0 2px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      background:#fff;
      color:var(--purple);
      box-shadow:0 5px 15px rgba(70,40,90,.14);
      border:1px solid #dfcfed;
    }
    button:active{transform:translateY(2px)}
    #status{
      min-height:24px;
      text-align:center;
      margin-top:8px;
      font-weight:700;
      color:#65438e;
    }
    @media (max-width:700px){
      body{padding:10px}
      .panel{padding:8px;border-radius:18px}
      .instruction{font-size:18px}
      .keyboard-shell{height:220px}
      .white-key{min-width:74px;font-size:16px}
    }
    @media (orientation:landscape) and (max-height:520px){
      body{padding:6px}
      header{margin-bottom:4px}
      h1{font-size:28px;margin-bottom:3px}
      .instruction{font-size:15px}
      .panel{margin-top:8px}
      #staff{min-width:760px}
      .keyboard-shell{height:165px;min-width:680px;border-width:7px}
      .white-key{min-width:80px;padding-bottom:8px}
      .key-dot{width:22px;height:22px}
      .controls{margin-top:8px}
      button{padding:8px 15px;font-size:15px}
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>נגנו את המנגינה</h1>
      <p class="instruction">נגנו את המנגינה לפי התווים, וגלו את התחנה הבאה שלכם.</p>
    </header>

    <section class="panel" aria-label="התווים">
      <div class="staff-wrap">
        <svg id="staff" viewBox="0 0 1100 330" role="img" aria-label="ארבע תיבות של תווים ללא מילים"></svg>
      </div>
    </section>

    <section class="panel" aria-label="פסנתר">
      <div class="keyboard-scroll">
        <div class="keyboard-shell" id="keyboard">
          <button class="white-key" data-note="C4" aria-label="דו">
            <span class="key-label"><span class="key-dot" style="background:var(--do)"></span>דו</span>
          </button>
          <button class="white-key" data-note="D4" aria-label="רה">
            <span class="key-label"><span class="key-dot" style="background:var(--re)"></span>רה</span>
          </button>
          <button class="white-key" data-note="E4" aria-label="מי">
            <span class="key-label"><span class="key-dot" style="background:var(--mi)"></span>מי</span>
          </button>
          <button class="white-key" data-note="F4" aria-label="פה">
            <span class="key-label"><span class="key-dot" style="background:var(--fa)"></span>פה</span>
          </button>
          <button class="white-key" data-note="G4" aria-label="סול">
            <span class="key-label"><span class="key-dot" style="background:var(--sol)"></span>סול</span>
          </button>
          <button class="white-key" data-note="A4" aria-label="לה">
            <span class="key-label"><span class="key-dot" style="background:var(--la)"></span>לה</span>
          </button>
          <button class="white-key" data-note="B4" aria-label="סי">
            <span class="key-label"><span class="key-dot" style="background:var(--si)"></span>סי</span>
          </button>
          <button class="white-key" data-note="C5" aria-label="דו גבוה">
            <span class="key-label"><span class="key-dot" style="background:var(--do)"></span>דו</span>
          </button>

          <span class="black-key b1"></span><span class="black-key b2"></span>
          <span class="black-key b3"></span><span class="black-key b4"></span><span class="black-key b5"></span>
        </div>
      </div>

      <div class="controls">
        <button id="resetBtn">↻ נגנו שוב</button>
      </div>
      <div id="status">בלחיצה הראשונה ייטענו צלילי הפסנתר.</div>
    </section>
  </main>

<script>
  const COLORS = {
    C: getComputedStyle(document.documentElement).getPropertyValue('--do').trim(),
    D: getComputedStyle(document.documentElement).getPropertyValue('--re').trim(),
    E: getComputedStyle(document.documentElement).getPropertyValue('--mi').trim(),
    F: getComputedStyle(document.documentElement).getPropertyValue('--fa').trim(),
    G: getComputedStyle(document.documentElement).getPropertyValue('--sol').trim(),
    A: getComputedStyle(document.documentElement).getPropertyValue('--la').trim(),
    B: getComputedStyle(document.documentElement).getPropertyValue('--si').trim()
  };

  // ארבע התיבות הראשונות לפי התווים שסיפקת:
  // דו, לה, פה | דו, לה, פה | סול, לה, סול, פה | מי, רה, מי, דו
  const melody = [
    {note:'C4', beats:.5}, {note:'A4', beats:.5}, {note:'F4', beats:1},
    {note:'C4', beats:.5}, {note:'A4', beats:.5}, {note:'F4', beats:1},
    {note:'G4', beats:.5}, {note:'A4', beats:.5}, {note:'G4', beats:.5}, {note:'F4', beats:.5},
    {note:'E4', beats:.5}, {note:'D4', beats:.5}, {note:'E4', beats:.5}, {note:'C4', beats:.5}
  ];

  const sampleBase = 'https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/acoustic_grand_piano-mp3/';
  const audios = {};
  let audioCtx = null;

  function preloadSamples(){
    ['C4','D4','E4','F4','G4','A4','B4','C5'].forEach(note=>{
      const audio = new Audio(sampleBase + note + '.mp3');
      audio.preload = 'auto';
      audios[note] = audio;
    });
  }
  preloadSamples();

  function fallbackTone(note){
    const frequencies = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25};
    audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(.0001, now);
    gain.gain.exponentialRampToValueAtTime(.42, now+.012);
    gain.gain.exponentialRampToValueAtTime(.0001, now+1.3);
    gain.connect(audioCtx.destination);

    [1,2,3].forEach((mult,i)=>{
      const osc = audioCtx.createOscillator();
      osc.type = i===0 ? 'triangle' : 'sine';
      osc.frequency.value = frequencies[note]*mult;
      const partial = audioCtx.createGain();
      partial.gain.value = [1,.18,.07][i];
      osc.connect(partial).connect(gain);
      osc.start(now);
      osc.stop(now+1.35);
    });
  }

  function playNote(note, key){
    try{
      const src = audios[note].cloneNode();
      src.volume = .9;
      const promise = src.play();
      if (promise) promise.catch(()=>fallbackTone(note));
    }catch(e){ fallbackTone(note); }

    key.classList.add('active');
    setTimeout(()=>key.classList.remove('active'),180);
    document.getElementById('status').textContent = '';
  }

  document.querySelectorAll('.white-key').forEach(key=>{
    const trigger = e=>{
      e.preventDefault();
      playNote(key.dataset.note,key);
    };
    key.addEventListener('pointerdown',trigger);
  });

  document.getElementById('resetBtn').addEventListener('click',()=>{
    document.querySelectorAll('.white-key').forEach(k=>k.classList.remove('active'));
    document.getElementById('status').textContent='אפשר להתחיל שוב מהתו הראשון.';
  });

  // ציור החמשה והתווים ב-SVG
  const svg = document.getElementById('staff');
  const NS='http://www.w3.org/2000/svg';
  function el(name,attrs={}){
    const n=document.createElementNS(NS,name);
    Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v));
    return n;
  }

  const top=70, gap=22, left=95, right=1060;
  for(let i=0;i<5;i++){
    svg.appendChild(el('line',{x1:left,y1:top+i*gap,x2:right,y2:top+i*gap,stroke:'#555','stroke-width':'2'}));
  }

  // מפתח סול מסוגנן וטקסט משקל
  const clef=el('text',{x:20,y:157,'font-size':'120','font-family':'serif',fill:'#111'});
  clef.textContent='𝄞'; svg.appendChild(clef);
  const timeTop=el('text',{x:72,y:104,'font-size':'34','font-weight':'700',fill:'#111'}); timeTop.textContent='2'; svg.appendChild(timeTop);
  const timeBottom=el('text',{x:72,y:149,'font-size':'34','font-weight':'700',fill:'#111'}); timeBottom.textContent='4'; svg.appendChild(timeBottom);

  const pitchY={C4:180,D4:169,E4:158,F4:147,G4:136,A4:125,B4:114,C5:103};
  const measures=[
    melody.slice(0,3), melody.slice(3,6), melody.slice(6,10), melody.slice(10,14)
  ];
  const measureX=[130,360,590,820];
  const measureW=225;

  function drawNote(x,note,beats){
    const y=pitchY[note];
    if(note==='C4'){
      svg.appendChild(el('line',{x1:x-15,y1:y,x2:x+15,y2:y,stroke:'#111','stroke-width':'2'}));
    }
    svg.appendChild(el('ellipse',{cx:x,cy:y,rx:'10',ry:'7',fill:'#111',transform:`rotate(-18 ${x} ${y})`}));
    svg.appendChild(el('line',{x1:x+9,y1:y,x2:x+9,y2:y-48,stroke:'#111','stroke-width':'3'}));
    if(beats===.5){
      svg.appendChild(el('path',{d:`M ${x+9} ${y-48} q 20 5 8 25`,fill:'none',stroke:'#111','stroke-width':'3'}));
    }
    svg.appendChild(el('circle',{cx:x,cy:238,r:'11',fill:COLORS[note[0]],stroke:'#fff','stroke-width':'2'}));
  }

  measures.forEach((measure,mi)=>{
    const x0=measureX[mi];
    const total=measure.reduce((s,n)=>s+n.beats,0);
    let acc=0;
    measure.forEach(item=>{
      const x=x0+26+(acc+item.beats/2)/total*(measureW-52);
      drawNote(x,item.note,item.beats);
      acc+=item.beats;
    });
    const barX=x0+measureW;
    svg.appendChild(el('line',{x1:barX,y1:top,x2:barX,y2:top+4*gap,stroke:'#111','stroke-width':mi===3?'5':'2'}));
  });
</script>
</body>
</html>
