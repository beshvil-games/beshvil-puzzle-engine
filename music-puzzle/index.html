<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#4f8b3b">
  <title>Beshvil Music Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="brand-header">
      <img class="brand-logo" src="logo.png" alt="בשביל החוויה">
    </header>

    <section class="hero">
      <h1 id="gameTitle">נגנו את המנגינה</h1>
      <p id="gameSubtitle">וגלו את התחנה הבאה שלכם</p>
    </section>

    <section class="music-card" aria-label="התווים לנגינה">
      <div id="scoreViewport" class="score-viewport">
        <div id="score" class="score" role="img" aria-label="תווי המנגינה"></div>
      </div>
    </section>

    <section class="piano-card" aria-label="פסנתר">
      <div id="piano" class="piano" role="group" aria-label="קלידי פסנתר"></div>
      <p class="status-text">לחצו על הקלידים כדי לנגן</p>
    </section>

    <footer>© כל הזכויות שמורות לבשביל החוויה</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.4/dist/abcjs-basic-min.js"></script>
  <script src="song-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
