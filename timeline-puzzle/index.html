<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f8b3b">
  <title>חידת סדר כרונולוגי</title>

  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell">
    <header class="brand-header">
      <img
        src="../assets/logo.png"
        alt="בשביל החוויה – אירועים בדרך אחרת"
        class="brand-logo">
    </header>

    <section class="hero">
      <h1>סדרו את התמונות לפי הסדר הכרונולוגי</h1>

      <p class="instructions">
        מקום 1 הוא המוקדם ביותר. המקום האחרון הוא המאוחר ביותר.<br>
        במחשב גררו תמונה על תמונה אחרת. בטלפון לחצו לחיצה ממושכת ואז גררו.
      </p>
    </section>

    <section class="puzzle-card timeline-card">
      <div class="timeline-key" aria-hidden="true">
        <span>המוקדם ביותר</span>
        <div class="timeline-line"></div>
        <span>המאוחר ביותר</span>
      </div>

      <div id="container"></div>

      <div class="buttons">
        <button id="checkButton" class="btn-primary">בדיקה</button>
        <button id="shuffleButton">ערבוב מחדש</button>
        <button id="soundButton" class="btn-secondary" aria-pressed="true">
          🔊 צלילים פעילים
        </button>
      </div>

      <div id="message" class="message" aria-live="polite"></div>

      <section id="successPanel" class="success-panel" aria-live="polite">
        <h2>כל הכבוד!</h2>
        <p>מצאתם את התחנה הבאה שלכם.</p>
      </section>
    </section>

    <footer class="site-footer">
      © 2026 בשביל החוויה – אירועים בדרך אחרת. כל הזכויות שמורות.
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
