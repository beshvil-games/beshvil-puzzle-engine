<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#4f8b3b">
  <title>תשבץ היגיון</title>

  <link rel="stylesheet" href="../assets/shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="brand-header">
      <img class="brand-logo"
           src="../assets/logo.png"
           alt="בשביל החוויה – אירועים בדרך אחרת">
    </header>

    <section class="hero">
      <h1 id="gameTitle">תשבץ היגיון</h1>
      <div id="instructions" class="instructions"></div>
    </section>

    <section class="puzzle-card crossword-card">
      <div class="crossword-layout">
        <section class="board-panel" aria-label="לוח התשבץ">
          <div class="board-frame">
            <div id="crosswordGrid" class="crossword-grid"></div>
          </div>
          <p class="board-tip">לחצו על הגדרה, ואז הקלידו את התשובה.</p>
        </section>

        <section class="clues-panel" aria-label="הגדרות התשבץ">
          <h2 class="card-title">הגדרות</h2>

          <div id="mobileClueNavigator" class="mobile-clue-navigator" aria-live="polite">
            <div class="mobile-clue-counter">
              <button id="prevClueButton" class="clue-nav-button" type="button" aria-label="להגדרה הקודמת">‹</button>
              <span id="mobileCluePosition"></span>
              <button id="nextClueButton" class="clue-nav-button" type="button" aria-label="להגדרה הבאה">›</button>
            </div>
            <button id="mobileClueCard" class="mobile-clue-card" type="button"></button>
            <button id="mobileCheckButton" class="mobile-check-button btn-primary" type="button">בדיקת תשובות</button>
          </div>

          <ol id="cluesList" class="clues-list"></ol>

          <div class="landscape-actions">
            <button id="landscapeCheckButton" class="btn-primary" type="button">בדיקת תשובות</button>
            <div id="landscapeSolvedMessage" class="landscape-solved-message hidden">
              <strong>כל הכבוד!</strong>
              <span>הטור הירוק רומז על התחנה הבאה.</span>
            </div>
          </div>
        </section>
      </div>

      <div class="actions">
        <button id="checkButton" class="btn-primary" type="button">בדיקת תשובות</button>
        <button id="clearButton" class="btn-secondary" type="button">ניקוי התשבץ</button>
      </div>

      <div id="message" class="message" aria-live="polite"></div>

      <section id="successPanel" class="success-panel hidden" aria-live="polite">
        <h2>כל הכבוד!</h2>
        <p>פתרתם את התשבץ.</p>
        <p>הטור הירוק רומז על התחנה הבאה.</p>
      </section>
    </section>

    <footer class="site-footer">
      © 2026 בשביל החוויה – אירועים בדרך אחרת. כל הזכויות שמורות.
    </footer>
  </main>

  <script src="puzzle.js"></script>
  <script src="script.js"></script>
</body>
</html>
